<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Race 00</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modes.css">
</head>
<body>

    <h1 class="page-title">𝗜'𝗺 𝗷𝘂𝘀𝘁 𝗮 𝗴𝗶𝗿𝗹 🌸ྀི Pick-me calculator for engineers ⋆.ೃ࿔🌸</h1>
    
    <div class="side-drawer" id="sideDrawer">
        <div class="drawer-header">Modes</div>
        <ul class="drawer-menu">
            <li class="active">Standard</li>
            <li class="drawer-item">Converter</li>
            <li class="drawer-item">Programmer</li>
        </ul>
    </div>

    <div class="drawer-overlay" id="drawerOverlay"></div>

    <div class="calculator">
        <div class="calc-topbar">
            <button class="hamburger" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <span class="calc-mode-label">Standard</span>
        </div>

        <div class="display-wrapper">
            <div id="history" class="history-field"></div>
            <div id="display" class="display-field">0</div>
        </div>

        <div id="standard-module" class="mode-module">
            <div class="buttons-grid">
                <button class="btn btn-mem" onclick="memoryClear()">MC</button>
                <button class="btn btn-mem" onclick="memoryRecall()">MR</button>
                <button class="btn btn-mem" onclick="memoryAdd()">M+</button>
                <button class="btn btn-mem" onclick="memorySubtract()">M−</button>

                <button class="btn btn-func" onclick="factorial()">x!</button>
                <button class="btn btn-func" onclick="power()">xⁿ</button>
                <button class="btn btn-func" onclick="square()">x²</button>
                <button class="btn btn-func" onclick="squareRoot()">√x</button>

                <button class="btn btn-action" onclick="clearDisplay()">C</button>
                <button class="btn btn-action" onclick="backspace()">⌫</button>
                <button class="btn btn-action" onclick="toggleSign()">+/-</button>
                <button class="btn btn-action" onclick="appendPercent()">%</button>

                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn btn-operator" onclick="setOperator('÷')">÷</button>

                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn btn-operator" onclick="setOperator('*')">×</button>

                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn btn-operator" onclick="setOperator('-')">−</button>
                <button class="btn" onclick="appendNumber('0')">0</button>
                <button class="btn" onclick="appendDecimal('.')">.</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>
                <button class="btn btn-operator" onclick="setOperator('+')">+</button>
            </div>
        </div>

        <div id="converter-module" class="mode-module" style="display: none;">
            <div class="converter-ui">
                <select id="convert-category" class="calc-select" onchange="updateUnits()">
                    <option value="length">Length</option>
                    <option value="weight">Weight</option>
                    <option value="area">Area</option>
                </select>

                <div class="convert-fields">
                    <div class="convert-field-row">
                        <select id="unit-from" class="unit-select" onchange="convertValue()">
                            <option value="cm">cm</option>
                            <option value="m">m</option>
                            <option value="km">km</option>
                        </select>
                        <div class="convert-field-value" id="convert-input-display">0</div>
                    </div>

                    <div class="convert-divider">↓</div>

                    <div class="convert-field-row">
                        <select id="unit-to" class="unit-select" onchange="convertValue()">
                            <option value="m">m</option>
                            <option value="cm">cm</option>
                            <option value="km">km</option>
                        </select>
                        <div class="convert-field-value convert-result" id="convert-result-display">0</div>
                    </div>
                </div>
            </div>
            <div class="buttons-grid converter-grid">
                <button class="btn btn-action" onclick="clearDisplay()">C</button>
                <button class="btn btn-action" onclick="backspace()">⌫</button>
                <button class="btn btn-action" onclick="appendDecimal('.')">.</button>

                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>

                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>

                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>

                <button class="btn btn-zero" onclick="appendNumber('0')">0</button>
            </div>
        </div>

        <div id="programmer-module" class="mode-module" style="display: none;">
            <div class="system-indicators">
                <div class="sys-item active" data-sys="DEC">DEC: <span id="dec-val">0</span></div>
                <div class="sys-item" data-sys="BIN">BIN: <span id="bin-val">0</span></div>
                <div class="sys-item" data-sys="HEX">HEX: <span id="hex-val">0</span></div>
            </div>
            <div class="buttons-grid programmer-grid">
                <button class="btn btn-func hex-btn" disabled onclick="appendNumber('A')">A</button>
                <button class="btn btn-func hex-btn" disabled onclick="appendNumber('B')">B</button>
                <button class="btn btn-func hex-btn" disabled onclick="appendNumber('C')">C</button>
                <button class="btn btn-operator" onclick="clearDisplay()">C</button>

                <button class="btn btn-func hex-btn" disabled onclick="appendNumber('D')">D</button>
                <button class="btn btn-func hex-btn" disabled onclick="appendNumber('E')">E</button>
                <button class="btn btn-func hex-btn" disabled onclick="appendNumber('F')">F</button>
                <button class="btn btn-operator" onclick="backspace()">⌫</button>

                <button class="btn digit-dec" onclick="appendNumber('7')">7</button>
                <button class="btn digit-dec" onclick="appendNumber('8')">8</button>
                <button class="btn digit-dec" onclick="appendNumber('9')">9</button>
                <button class="btn btn-operator" onclick="setOperator('/')">÷</button>

                <button class="btn digit-dec" onclick="appendNumber('4')">4</button>
                <button class="btn digit-dec" onclick="appendNumber('5')">5</button>
                <button class="btn digit-dec" onclick="appendNumber('6')">6</button>
                <button class="btn btn-operator" onclick="setOperator('*')">×</button>

                <button class="btn digit-bin" onclick="appendNumber('1')">1</button>
                <button class="btn digit-dec" onclick="appendNumber('2')">2</button>
                <button class="btn digit-dec" onclick="appendNumber('3')">3</button>
                <button class="btn btn-operator" onclick="setOperator('-')">-</button>

                <button class="btn btn-zero digit-bin" onclick="appendNumber('0')">0</button>
                <button class="btn btn-operator" onclick="setOperator('+')">+</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <script src="js/basic.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/programmer.js"></script>
    <script src="js/memory.js"></script>
</body>
</html>
