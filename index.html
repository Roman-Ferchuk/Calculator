<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Race 00</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modes.css">
</head>
<body>

    <h1 class="page-title">𝗜'𝗺 𝗷𝘂𝘀𝘁 𝗮 𝗴𝗶𝗿𝗹 🌸ྀི Pick-me calculator for engineers ⋆.ೃ࿔🌸</h1>
    
    <div class="side-drawer" id="sideDrawer">
        <div class="drawer-header">Modes</div>
        <ul class="drawer-menu">
            <li class="active">Standard</li>
            <li class="drawer-item">Converter</li>
            <li class="drawer-item">Programmer</li>
        </ul>
    </div>

    <div class="drawer-overlay" id="drawerOverlay"></div>

    <div class="calculator">
        <div class="calc-topbar">
            <button class="hamburger" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <span class="calc-mode-label">Standard</span>
        </div>

        <div class="display-wrapper">
            <div id="history" class="history-field"></div>
            <div id="display" class="display-field">0</div>
        </div>

        <div id="standard-module" class="mode-module">
            <div class="buttons-grid">
                <button class="btn btn-mem" id="memory-clear">MC</button>
                <button class="btn btn-mem" id="memory-recall">MR</button>
                <button class="btn btn-mem" id="memory-add">M+</button>
                <button class="btn btn-mem" id="memory-subtract">M−</button>

                <button class="btn btn-func" id="factorial">x!</button>
                <button class="btn btn-func" id="exponent">xⁿ</button>
                <button class="btn btn-func" id="square">x²</button>
                <button class="btn btn-func" id="square-root">√x</button>

                <button class="btn btn-action" id="clearDisplay">C</button>
                <button class="btn btn-action" id="backspace">⌫</button>
                <button class="btn btn-action" id="toggleSign">+/-</button>
                <button class="btn btn-action" id="appendPercent">%</button>

                <button class="btn btn-number" >7</button>
                <button class="btn btn-number" >8</button>
                <button class="btn btn-number" >9</button>
                <button class="btn btn-operator">÷</button>

                <button class="btn btn-number" >4</button>
                <button class="btn btn-number" >5</button>
                <button class="btn btn-number" >6</button>
                <button class="btn btn-operator">×</button>

                <button class="btn btn-number">1</button>
                <button class="btn btn-number" >2</button>
                <button class="btn btn-number" >3</button>
                <button class="btn btn-operator" >−</button>
                <button class="btn btn-number" >0</button>
                <button class="btn btn-decimal" >.</button>
                <button class="btn btn-equals" id="calculate">=</button>
                <button class="btn btn-operator">+</button>
            </div>
        </div>

        <div id="converter-module" class="mode-module" style="display: none;">
            <div class="converter-ui">
                <select id="convert-category" class="calc-select" onchange="updateUnits()">
                    <option value="length">Length</option>
                    <option value="weight">Weight</option>
                    <option value="area">Area</option>
                </select>

                <div class="convert-fields">
                    <div class="convert-field-row">
                        <select id="unit-from" class="unit-select" onchange="convertValue()">
                            <option value="cm">cm</option>
                            <option value="m">m</option>
                            <option value="km">km</option>
                        </select>
                        <div class="convert-field-value" id="convert-input-display">0</div>
                    </div>

                    <div class="convert-divider">↓</div>

                    <div class="convert-field-row">
                        <select id="unit-to" class="unit-select" onchange="convertValue()">
                            <!-- <option value="m">m</option>
                            <option value="cm">cm</option>
                            <option value="km">km</option> -->
                        </select>
                        <div class="convert-field-value convert-result" id="convert-result-display">0</div>
                    </div>
                </div>
            </div>
            <div class="buttons-grid converter-grid">
                <button class="btn btn-action" id="clear-display">C</button>
                <button class="btn btn-action" id="backspace">⌫</button>
                <button class="btn btn-action" id="append-decimal">.</button>

                <button class="btn btn-number">7</button>
                <button class="btn btn-number">8</button>
                <button class="btn btn-number">9</button>

                <button class="btn btn-number">4</button>
                <button class="btn btn-number">5</button>
                <button class="btn btn-number">6</button>

                <button class="btn btn-number">1</button>
                <button class="btn btn-number">2</button>
                <button class="btn btn-number">3</button>

                <button class="btn btn-number">0</button>
            </div>
        </div>

        <div id="programmer-module" class="mode-module" style="display: none;">
            <div class="system-indicators">
                <div class="sys-item active" data-sys="DEC">DEC: <span id="dec-val">0</span></div>
                <div class="sys-item" data-sys="BIN">BIN: <span id="bin-val">0</span></div>
                <div class="sys-item" data-sys="HEX">HEX: <span id="hex-val">0</span></div>
            </div>
            <div class="buttons-grid programmer-grid">
                <button class="btn btn-func hex-btn" disabled>A</button>
                <button class="btn btn-func hex-btn" disabled>B</button>
                <button class="btn btn-func hex-btn" disabled>C</button>
                <button class="btn btn-operator" id="clear-display">C</button>

                <button class="btn btn-func hex-btn" disabled>D</button>
                <button class="btn btn-func hex-btn" disabled>E</button>
                <button class="btn btn-func hex-btn" disabled>F</button>
                <button class="btn btn-action" id="backspace">⌫</button>

                <button class="btn digit-dec">7</button>
                <button class="btn digit-dec">8</button>
                <button class="btn digit-dec">9</button>
                <button class="btn btn-operator">÷</button>

                <button class="btn digit-dec">4</button>
                <button class="btn digit-dec">5</button>
                <button class="btn digit-dec">6</button>
                <button class="btn btn-operator">×</button>

                <button class="btn digit-bin">1</button>
                <button class="btn digit-dec">2</button>
                <button class="btn digit-dec">3</button>
                <button class="btn btn-operator">-</button>

                <button class="btn btn-zero digit-bin">0</button>
                <button class="btn btn-operator">+</button>
                <button class="btn btn-equals" id="calculate">=</button>
            </div>
        </div>
    </div>

    <script src="js/calculator_engine.js"></script>

    <script src="js/standard_calculator.js"></script>
    <script src="js/programmer_calculator.js"></script>
    <script src="js/converter.js"></script>

    <script src="js/main.js"></script>
</body>
</html>
